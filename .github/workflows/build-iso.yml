name: Build Kiosk

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow concurrent builds for different architectures
concurrency:
  group: "build-kiosk-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-kiosk-x86_64:
    name: Build Kiosk ISO (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
          submodules: "recursive" # Fetch submodules recursively

      - name: Set up QEMU (binfmt)
        run: |
          sudo apt-get update

          # Install required components
          sudo apt-get install -y qemu-user-binfmt binfmt-support

          # Ensure binfmt_misc is mounted
          sudo mount -t binfmt_misc none /proc/sys/fs/binfmt_misc || true

          # Restart binfmt service (critical step)
          sudo systemctl restart systemd-binfmt || true

          # Explicitly register QEMU handlers (this is what you're missing)
          for arch in aarch64 arm; do
            sudo update-binfmts --enable qemu-$arch || true
          done

          # Verify registration
          ls /proc/sys/fs/binfmt_misc || true
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 || true

      - name: Build Kiosk x86_64
        run: env CI=true sudo ./build.sh <<< "1"

      - name: Upload x86_64 ISO
        uses: actions/upload-artifact@v4
        with:
          name: Built-ISO-x86_64
          path: build/iso/*
          retention-days: 10
          compression-level: 0

  build-kiosk-rpi:
    name: Build Kiosk ISO (RPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
          submodules: "recursive" # Fetch submodules recursively

      - name: Set up QEMU (binfmt)
        run: |
          sudo apt-get update

          # Install required components
          sudo apt-get install -y qemu-user-binfmt binfmt-support

          # Ensure binfmt_misc is mounted
          sudo mount -t binfmt_misc none /proc/sys/fs/binfmt_misc || true

          # Restart binfmt service (critical step)
          sudo systemctl restart systemd-binfmt || true

          # Explicitly register QEMU handlers (this is what you're missing)
          for arch in aarch64 arm; do
            sudo update-binfmts --enable qemu-$arch || true
          done

          # Verify registration
          ls /proc/sys/fs/binfmt_misc || true
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 || true

      - name: Build Kiosk RPI
        run: env CI=true sudo ./build.sh <<< "2"

      - name: Upload RPI IMG
        uses: actions/upload-artifact@v4
        with:
          name: Built-IMG-RPI
          path: build/iso/*
          retention-days: 10
          compression-level: 0
